name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  NODE_VERSION: 22

jobs:
  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read # Needed for SARIF upload in private repos
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Run Linter
        run: |
          hasError=false

          echo "Running ESLint..."
          pnpm lint || { hasError=true; }

          if [ "$hasError" = true ]; then
            echo "Lint failed. Please fix the errors.";
            echo "Try running: pnpm format --write";
            exit 1;
          fi

        continue-on-error: false

      ## Requires GitHub Advanced Security to be enabled
      ## https://github.com/enterprise/advanced-security#pricing
      ## Make sure to format ESLint report as SARIF
      # - name: Upload analysis results to GitHub
      #   uses: github/codeql-action/upload-sarif@v3
      #   with:
      #     sarif_file: eslint-results.sarif
      #     wait-for-processing: true

  build:
    name: Validate Build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Use Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Load .env from secret
        run: echo "${{ secrets.ENV_FILE }}" > .env

      - name: Build
        run: pnpm build

      - name: Package dist
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: tar -czf dist.tar.gz -C dist .

      - name: Update latest release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: "Automated build from ${{ github.sha }}"
          make_latest: true
          files: dist.tar.gz
